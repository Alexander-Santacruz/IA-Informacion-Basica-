<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión - Mundo IA</title>
    <link rel="stylesheet" href="Estilo css/estilo.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0e14;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1f2e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            width: 300px;
        }
        h1, h2 {
            text-align: center;
            color: #10b981;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            color: #f0f0f0;
        }
        input {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2a2f3e;
            color: #f0f0f0;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #059669;
        }
        p {
            text-align: center;
            margin-top: 15px;
        }
        a {
            color: #10b981;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inicio de Sesión</h1>
        <h2>Iniciar Sesión</h2>
        <form action="index.html" method="get">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Iniciar Sesión</button>
        </form>
        <p>Nota: Este es un formulario básico. Para funcionalidad real, se necesita JavaScript o un servidor.</p>
    </div>
</body>
</html>
